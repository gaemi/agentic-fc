name: prerelease

on:
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute prerelease version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          sha="${{ github.event.workflow_run.head_sha }}"
          version_base="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "${version_base}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be MAJOR.MINOR.PATCH, got ${version_base}" >&2
            exit 1
          fi
          short_sha="$(git rev-parse --short=12 "${sha}")"
          commit_count="$(git rev-list --count "${sha}")"
          commit_ts="$(git show -s --format=%ct "${sha}")"
          version="v${version_base}-pre.${commit_count}.g${short_sha}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          echo "commit_ts=${commit_ts}" >> "${GITHUB_OUTPUT}"

      - name: Package binaries
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET_SHA: ${{ steps.version.outputs.sha }}
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist/assets dist/package

          smoke_version() {
            local bin="$1"
            timeout 10s "${bin}" --version >/dev/null
          }

          ldflags="-s -w"
          ldflags="${ldflags} -X github.com/gaemi/agentic-fc/internal/buildinfo.Version=${VERSION}"
          ldflags="${ldflags} -X github.com/gaemi/agentic-fc/internal/buildinfo.Commit=${TARGET_SHA}"

          commands=(
            "agenticfc:./cmd/agenticfc"
            "agenticfc-console:./cmd/agenticfc-console"
            "agenticfc-calibrate:./cmd/agenticfc-calibrate"
          )
          targets=(
            "linux:amd64"
            "linux:arm64"
            "darwin:amd64"
            "darwin:arm64"
            "windows:amd64"
            "windows:arm64"
          )

          for target in "${targets[@]}"; do
            IFS=: read -r goos goarch <<< "${target}"
            archive="agentic-fc_${VERSION}_${goos}_${goarch}"
            pkgdir="dist/package/${archive}"
            mkdir -p "${pkgdir}"

            for command in "${commands[@]}"; do
              IFS=: read -r name path <<< "${command}"
              bin="${name}"
              if [[ "${goos}" == "windows" ]]; then
                bin="${bin}.exe"
              fi
              GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
                go build -trimpath -ldflags="${ldflags}" -o "${pkgdir}/${bin}" "${path}"
            done

            cp README.md CHANGELOG.md LICENSE "${pkgdir}/"

            if [[ "${goos}" == "linux" && "${goarch}" == "amd64" ]]; then
              smoke_version "${pkgdir}/agenticfc"
              smoke_version "${pkgdir}/agenticfc-console"
              smoke_version "${pkgdir}/agenticfc-calibrate"
            fi

            if [[ "${goos}" == "windows" ]]; then
              (cd dist/package && zip -qr "../assets/${archive}.zip" "${archive}")
            else
              tar -C dist/package -czf "dist/assets/${archive}.tar.gz" "${archive}"
            fi
          done

          (cd dist/assets && sha256sum *.tar.gz *.zip > checksums.txt)
          (cd dist/assets && sha256sum -c checksums.txt)

      - name: Publish GitHub prerelease
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET_SHA: ${{ steps.version.outputs.sha }}
          COMMIT_TS: ${{ steps.version.outputs.commit_ts }}
          CI_RUN_URL: ${{ github.event.workflow_run.html_url }}
          RELEASE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          cat > release-notes.md <<EOF
          Automated prerelease for ${TARGET_SHA}.

          This prerelease was generated after the main-branch CI workflow passed.
          It contains cross-platform packages for the daemon, spectator console,
          and calibration CLI.

          Commit timestamp: ${COMMIT_TS}
          CI run: ${CI_RUN_URL}
          Prerelease build run: ${RELEASE_RUN_URL}
          EOF

          if gh release view "${VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" dist/assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${VERSION}" dist/assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${TARGET_SHA}" \
              --prerelease \
              --title "${VERSION}" \
              --notes-file release-notes.md
          fi
